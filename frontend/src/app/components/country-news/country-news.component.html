<div *ngIf="error" class="container mt-4">
  <div class="alert alert-custom text-center">
    {{ error }}
    <button class="btn btn-sm btn-outline-danger ms-3" (click)="fetchData()">Retry</button>
  </div>
</div>

<!-- LOADING SKELETON -->
<div class="container my-4" *ngIf="isLoading">
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-text title"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text short"></div>
      </div>
    </div>
  </div>
</div>

<!-- NEWS CARDS -->
<div class="container my-5" *ngIf="!isLoading">
  <div class="row" *ngIf="data.length > 0; else noData">
    <div class="col-md-4 mb-4" *ngFor="let article of data">
      <div class="news-card h-100">
        <div class="img-wrapper">
          <img [src]="article.urlToImage || 'assets/googleNews.png'"
               (error)="handleImageError($event)"
               [alt]="article.title" />
          <span class="badge bg-primary source-badge">
            {{ article.source?.name || 'News' }}
          </span>
        </div>
        <div class="p-3">
          <h5 class="card-title">
            {{ article.title || 'No Title Available' }}
          </h5>
          <p class="card-text">
            {{ article.description || 'No description available.' }}
          </p>
          <a [href]="article.url"
             target="_blank"
             class="btn btn-read"
             [class.disabled]="!article.url">
            Read Full Story
          </a>
        </div>
        <div class="card-footer bg-white border-top-0">
          <small class="text-muted">
            {{ article.publishedAt | date:'mediumDate' }} •
            {{ article.author || 'Staff' }}
          </small>
          <!-- Share and Save Buttons -->
          <app-shared-news [article]="article"></app-shared-news>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noData>
    <div class="text-center my-5">
      <h4 class="text-muted">No news found</h4>
    </div>
  </ng-template>
</div>
<div *ngIf="!isLoading && totalResults > 0" class="fixed-pagination-container">
  <div class="glass-pagination">

    <button class="page-btn"
            (click)="handlePrev()"
            [disabled]="page <= 1">
      ← Prev
    </button>

    <span>Page <strong>{{ page }}</strong> of {{ totalPages }}</span>

    <button class="page-btn"
            (click)="handleNext()"
            [disabled]="page >= totalPages">
      Next →
    </button>
  </div>
</div>
