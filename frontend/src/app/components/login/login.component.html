<div class="login-container">
  <div class="login-box">
    <div class="login-image">
      <img [src]="newsLoginImage" alt="News Login" />
    </div>

    <div class="login-form">
      <h2>Welcome Back. The News Awaits.</h2>

      <form (ngSubmit)="login(form)" #form="ngForm" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" [(ngModel)]="username" name="username" required #usernameField="ngModel"
            [ngClass]="{ 'input-error': usernameField.invalid && usernameField.touched }" />
          <span class="field-error" *ngIf="usernameField.invalid && usernameField.touched">
            Username is required.
          </span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" [(ngModel)]="password" name="password" required #passwordField="ngModel"
            [ngClass]="{ 'input-error': passwordField.invalid && passwordField.touched }" />
          <span class="field-error" *ngIf="passwordField.invalid && passwordField.touched">
            Password is required.
          </span>
        </div>

        <button type="submit" [disabled]="form.invalid || isLoading">
          <span *ngIf="!isLoading">Login</span>
          <span *ngIf="isLoading">Logging in...</span>
        </button>

      </form>

      <!-- Single unified alert — removed the duplicate error display that was
           showing errorMessage twice (once above and once inside the alert div) -->
      <div *ngIf="success || errorMessage" [ngClass]="alertClass" role="alert">
        <span *ngIf="success">Login successful! Redirecting...</span>
        <span *ngIf="errorMessage && !success">{{ errorMessage }}</span>
      </div>

      <div class="sign-in-link">
        <p>Forgot your password? <a (click)="forgotPassword()">Reset your password</a></p>
      </div>
      <div class="sign-in-link">
        <p>Don't have an account? <a (click)="navigateToRegister()">Register</a></p>
      </div>

    </div>
  </div>
</div>
