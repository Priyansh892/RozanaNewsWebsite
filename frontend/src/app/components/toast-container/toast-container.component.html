<div class="toast-wrapper">
    <div *ngFor="let toast of (toasts$ | async)" class="toast-item" [ngClass]="toast.type">
        <div class="toast-message">
            {{ toast.message }}
        </div>

        <button class="toast-close" (click)="dismiss(toast.id)">
            ✕
        </button>
    </div>
</div>
