<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">RozanaNews</a>

    <button class="navbar-toggler" type="button" (click)="toggleNavbar()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="isNavbarOpen">
      <ul class="navbar-nav ms-auto">

        <!-- Only show news nav items when logged in -->

        <!-- All News -->
        <li class="nav-item" *ngIf="isLoggedIn()">
          <a class="nav-link" routerLink="/all-news" routerLinkActive="active" (click)="closeNavbar()">
            All News
          </a>
        </li>

        <!-- For You -->
        <li class="nav-item" *ngIf="isLoggedIn()">
          <a class="nav-link for-you-link" routerLink="/for-you" routerLinkActive="active" (click)="closeNavbar()">
            ✨ For You
          </a>
        </li>

        <!-- Top Headlines Dropdown -->
        <li class="nav-item dropdown" *ngIf="isLoggedIn()">
          <a class="nav-link dropdown-toggle" id="headlinesDropdown" role="button" data-bs-toggle="dropdown">
            Top Headlines
          </a>
          <ul class="dropdown-menu shadow" aria-labelledby="headlinesDropdown">
            <li *ngFor="let category of categories">
              <a class="dropdown-item text-capitalize" (click)="navigateToTopHeadlines(category); closeNavbar()">
                {{ category }}
              </a>
            </li>
          </ul>
        </li>

        <!-- Countries Dropdown -->
        <li class="nav-item dropdown" *ngIf="isLoggedIn()">
          <a class="nav-link dropdown-toggle" id="countriesDropdown" role="button" data-bs-toggle="dropdown">
            Countries
          </a>
          <ul class="dropdown-menu dropdown-menu-end custom-dropdown-scroll shadow" aria-labelledby="countriesDropdown">
            <li *ngFor="let country of countries">
              <a class="dropdown-item d-flex justify-content-between align-items-center"
                [class.active-item]="selectedCountry === country.countryName"
                (click)="navigateToCountryNews(country.countryName); closeNavbar()">
                {{ country.countryName }}
                <i *ngIf="selectedCountry === country.countryName" class="bi bi-check2 text-info"></i>
              </a>
            </li>
          </ul>
        </li>

        <!-- Dark mode toggle - always visible -->
        <li class="nav-item d-flex align-items-center me-1">
          <button class="dark-toggle" (click)="toggleDarkMode()">
            <span *ngIf="!(darkModeService.isDark$ | async)">🌙 Dark</span>
            <span *ngIf="darkModeService.isDark$ | async">☀️ Light</span>
          </button>
        </li>

        <!-- Auth: not logged in -->
        <li class="nav-item" *ngIf="!isLoggedIn()">
          <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
        </li>
        <li class="nav-item" *ngIf="!isLoggedIn()">
          <a class="nav-link" routerLink="/register" routerLinkActive="active">Register</a>
        </li>

        <!-- Auth: logged in - user dropdown -->
        <li class="nav-item dropdown" *ngIf="isLoggedIn()">
          <a class="nav-link dropdown-toggle user-menu" id="userDropdown" role="button" data-bs-toggle="dropdown"
            aria-expanded="false">
            <span class="user-avatar">{{ getUsername().charAt(0).toUpperCase() }}</span>
            {{ getUsername() }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end user-dropdown shadow" aria-labelledby="userDropdown">
            <li>
              <a class="dropdown-item" routerLink="/analytics" (click)="closeNavbar()">
                <i class="fas fa-chart-bar me-2"></i> My Analytics
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/saved-news" (click)="closeNavbar()">
                <i class="fas fa-bookmark me-2"></i> Saved Articles
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/reading-history" (click)="closeNavbar()">
                <i class="fas fa-history me-2"></i> Reading History
              </a>
            </li>
            <li>
              <hr class="dropdown-divider" />
            </li>
            <li>
              <a class="dropdown-item text-danger" (click)="logout(); closeNavbar()">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
              </a>
            </li>
          </ul>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- Global Toast Notifications -->
<app-toast-container></app-toast-container>

<main>
  <router-outlet></router-outlet>
</main>
